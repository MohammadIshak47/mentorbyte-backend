services:
  - type: web
    name: mentorbyte-api
    runtime: python
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 120
      --log-level info
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "your-app-name.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: mentorbyte-db
          property: connectionString
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-site.netlify.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://your-site.netlify.app"
      - key: FRONTEND_URL
        value: "https://your-site.netlify.app"
      - key: SECURE_SSL_REDIRECT
        value: "True"

databases:
  - name: mentorbyte-db
    plan: free
    databaseName: mentorbyte
    user: mentorbyte_user
